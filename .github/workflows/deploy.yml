# Baut das Kommentatoren-Cockpit bei jedem Push auf main und deployt es zu
# GitHub Pages. Die Renndaten selbst liegen NICHT hier, sondern werden zur
# Laufzeit von der Hauptseite (aspl-rennkalender) per fetch() geladen.
name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # GitHub Pages meldet direkt nach dem Artifact-Upload oefter
      # "Deployment failed, try again later" — darum eingebaute Retries.
      - id: versuch1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.versuch1.outcome == 'failure'
        run: sleep 60
      - id: versuch2
        if: steps.versuch1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.versuch1.outcome == 'failure' && steps.versuch2.outcome == 'failure'
        run: sleep 120
      - id: deployment
        if: steps.versuch1.outcome == 'failure' && steps.versuch2.outcome == 'failure'
        uses: actions/deploy-pages@v4
